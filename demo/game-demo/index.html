<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pale Luna: Web Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="shortcut icon" href="/Public/ICO/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f2f0e3;
            --dark: #2e2e2e;
            --coral: #f76f53;
            --muted: rgba(46,46,46,0.06);
            --subtle: rgba(46,46,46,0.04);
            --ink-faint: rgba(46,46,46,0.35);
            --border: rgba(46,46,46,0.14);
            --radius: 1rem;
        }
        [data-theme="dark"] {
            --paper: #161614;
            --dark: #d4d2c3;
            --muted: rgba(255,255,255,0.04);
            --subtle: rgba(255,255,255,0.07);
            --ink-faint: rgba(212,210,195,0.4);
            --border: rgba(212,210,195,0.1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--paper);
            color: var(--dark);
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 500;
            font-optical-sizing: auto;
            font-variation-settings: "width" 100;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        #game-container {
            width: 100%;
            max-width: 680px;
            background: var(--paper);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.04),
                0 4px 6px -2px rgba(0,0,0,0.07),
                0 16px 48px -8px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
        }

        #title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-bottom: 1.5px solid var(--border);
            background: var(--muted);
            gap: 0.75rem;
        }
        #title-bar-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        #title-bar .moon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            opacity: 0.85;
        }
        #game-title {
            font-family: 'DM Serif Display', serif;
            font-size: 0.95rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.01em;
            color: var(--dark);
            white-space: nowrap;
        }
        #game-title span {
            font-style: normal;
            font-weight: 400;
            opacity: 0.5;
            font-size: 0.8rem;
            margin-left: 0.15rem;
        }

        .window-dots {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            opacity: 0.5;
        }
        .dot.red    { background: #ff5f57; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green  { background: #28c840; }

        #status-bar {
            padding: 0.5rem 1.25rem;
            border-bottom: 1px dashed var(--border);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-faint);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-height: 2rem;
        }
        #status-bar::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--coral);
            flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #text-box {
            padding: 1.5rem 1.5rem 1rem;
            min-height: 260px;
            line-height: 1.75;
            font-size: 0.95rem;
            white-space: pre-wrap;
            overflow-y: auto;
            flex: 1;
            scroll-behavior: smooth;
        }
        #text-box::-webkit-scrollbar { width: 4px; }
        #text-box::-webkit-scrollbar-track { background: transparent; }
        #text-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .ascii-art  { color: #8ab4c9; font-family: 'Courier New', monospace; font-size: 0.78rem; line-height: 1.3; }
        .red-text   { color: #c0392b; }
        .green-text { color: #27ae60; }
        .cyan-text  { color: #2980b9; }
        .yellow-text{ color: var(--coral); }
        .center-text{ text-align: center; display: block; }

        #divider {
            height: 1px;
            background: var(--border);
            margin: 0 1.25rem;
        }

        #choice-box {
            padding: 0.875rem 1.25rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        #choice-box:empty {
            padding: 0;
        }

        #choice-label {
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 0.25rem;
            display: none;
        }
        #choice-box:not(:empty) ~ * { display: block; }

        #choice-box button {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--muted);
            color: var(--dark);
            border: 1.5px solid var(--border);
            border-radius: 0.6rem;
            text-align: left;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition:
                background 0.15s ease,
                border-color 0.15s ease,
                transform 0.1s ease;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            line-height: 1.4;
        }

        #choice-box button::before {
            content: '›';
            color: var(--coral);
            font-size: 1.1rem;
            flex-shrink: 0;
            line-height: 1;
            margin-top: -1px;
        }

        #choice-box button:hover {
            background: var(--subtle);
            border-color: var(--coral);
            transform: translateX(2px);
        }

        #choice-box button:active {
            transform: translateX(1px) scale(0.99);
        }

        #footer-bar {
            padding: 0.6rem 1.25rem;
            border-top: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--muted);
        }
        #footer-bar .footer-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 0.72rem;
            font-style: italic;
            color: var(--ink-faint);
            letter-spacing: 0.02em;
        }
        #footer-bar .footer-badge {
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--coral);
            border: 1px solid var(--coral);
            border-radius: 3rem;
            padding: 0.15rem 0.55rem;
            opacity: 0.8;
        }

        @media (max-width: 520px) {
            body { padding: 0; align-items: flex-start; }
            #game-container {
                border-radius: 0;
                border-left: none;
                border-right: none;
                min-height: 100vh;
                box-shadow: none;
            }
            #text-box { min-height: 200px; font-size: 0.9rem; }
        }

         body {
            background-image: url('back.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
         body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.589);
            z-index: 0;
        }

        #game-container {
            position: relative;
            z-index: 1;
            border: 4px solid var(--border);
        }

        body {
        animation: fadeInPage 0.5s ease-out;
        }

        @keyframes fadeInPage {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
        }

        html, body {
    cursor: url('/Public/CUR/cursor.svg') 0 0, auto;
}

a, 
button, 
label, 
summary, 
select,
option,
input[type="submit"], 
input[type="button"], 
input[type="reset"], 
input[type="checkbox"], 
input[type="radio"], 
input[type="file"],
input[type="range"],
[role="button"], 
[role="link"], 
[role="menuitem"],
[onclick],          
.pointer,         
svg:has(path):hover  
{
    cursor: url('/Public/CUR/pointer.svg') 12 0, pointer !important;
}
input[type="text"], 
input[type="email"], 
input[type="password"], 
input[type="number"], 
input[type="search"], 
textarea, .about-material p,
[contenteditable="true"] {
    cursor: text;
}
    </style>
</head>
<body>
    <div id="game-container">

        <div id="title-bar">
            <div id="title-bar-left">
                <svg class="moon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"
                          fill="currentColor" opacity="0.7"/>
                </svg>
                <span id="game-title">Pale Luna <span>: Web Edition</span></span>
            </div>
            <div class="window-dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
        </div>

        <div id="status-bar">Ready</div>

        <div id="text-box"></div>

        <div id="divider"></div>

        <div id="choice-box"></div>

        <div id="footer-bar">
            <span class="footer-brand">Pale Luna</span>
            <span class="footer-badge">Web Edition</span>
        </div>

    </div>

    <script src="main-web.js"></script>
</body>
</html>
