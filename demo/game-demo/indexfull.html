<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pale Luna: Web Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="shortcut icon" href="/www/Public/ICO/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100;14..32,200;14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0,1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
        }

        :root {
            --md-sys-color-primary: #FFB4AB;
            --md-sys-color-on-primary: #5C2E2A;
            --md-sys-color-primary-container: #8C4A42;
            --md-sys-color-on-primary-container: #FFDAD6;
            --md-sys-color-secondary: #E6E1E5;
            --md-sys-color-on-secondary: #2B2930;
            --md-sys-color-tertiary: #CAC4D0;
            --md-sys-color-surface: #090909;
            --md-sys-color-surface-dim: #090909;
            --md-sys-color-surface-bright: #2B2930;
            --md-sys-color-background: #090909;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-on-surface-variant: #CAC4D0;
            --md-sys-color-outline: #938F99;
            --md-sys-color-outline-variant: #49454F;
            --md-expressive-coral: #FF8A7A;
            --md-font-display: 'Inter', sans-serif;
            --md-font-body: 'Inter', sans-serif;
            --md-shape-large: 28px;
            --md-shape-full: 9999px;
            --md-elevation-3: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px 0 rgba(0,0,0,0.3);
            --md-motion-emphasized: 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --md-motion-standard: 0.2s cubic-bezier(0.2, 0, 0, 1);
            
            --paper: #f2f0e3;
            --dark: #2e2e2e;
            --coral: #f76f53;
            --muted: rgba(46,46,46,0.06);
            --subtle: rgba(46,46,46,0.04);
            --ink-faint: rgba(46,46,46,0.35);
            --border: rgba(46,46,46,0.14);
            --radius: 1rem;
        }
        
        [data-theme="dark"] {
            --paper: #161614;
            --dark: #d4d2c3;
            --muted: rgba(255,255,255,0.04);
            --subtle: rgba(255,255,255,0.07);
            --ink-faint: rgba(212,210,195,0.4);
            --border: rgba(212,210,195,0.1);
        }

        body {
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            font-family: var(--md-font-body);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .m3-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px;
            background-color: var(--md-sys-color-surface);
            border-right: 1px solid var(--md-sys-color-outline-variant);
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform var(--md-motion-emphasized);
        }

        @media (max-width: 768px) {
            .m3-sidebar {
                transform: translateX(-100%);
                z-index: 1000;
                box-shadow: var(--md-elevation-3);
            }
            .m3-sidebar.open {
                transform: translateX(0);
            }
            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background-color: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(4px);
                z-index: 999;
                opacity: 0;
                visibility: hidden;
                transition: 0.25s ease;
            }
            .sidebar-overlay.active {
                opacity: 1;
                visibility: visible;
            }
            .menu-button-md {
                display: flex;
            }
        }

        @media (min-width: 769px) {
            .menu-button-md {
                display: none;
            }
            .main-content {
                margin-left: 280px;
            }
            .sidebar-overlay {
                display: none;
            }
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
        }

        .nav-section {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 16px;
            border-radius: var(--md-shape-large);
            color: var(--md-sys-color-on-surface);
            text-decoration: none;
            font-weight: 500;
            transition: all var(--md-motion-standard);
            margin: 2px 0;
            cursor: pointer;
        }

        .nav-item:hover {
            background-color: #8c494228;
        }

        .nav-item.active {
            background-color: #ffb4ab;
            color: #090909;
        }

        .nav-item .material-symbols-rounded {
            font-size: 22px;
        }

        .sidebar-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--md-sys-color-outline-variant);
        }

        .social-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 16px;
        }

        .social-icon-md {
            color: var(--md-sys-color-on-surface-variant);
            font-size: 1.25rem;
            transition: var(--md-motion-standard);
        }

        .social-icon-md:hover {
            color: var(--md-expressive-coral);
        }

        .menu-button-md {
            background: none;
            border: none;
            color: var(--md-sys-color-on-surface);
            cursor: pointer;
            padding: 8px;
            border-radius: var(--md-shape-full);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-button-md:hover {
            background-color: var(--md-sys-color-surface-dim);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
        }

        .menu-button-md {
            background: none;
            border: none;
            color: var(--md-sys-color-on-surface);
            cursor: pointer;
            padding: 8px;
            border-radius: var(--md-shape-full);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-button-md:hover {
            background-color: var(--md-sys-color-surface-dim);
        }

        .main-content {
            position: relative; 
            transition: margin-left 0.3s ease;
            min-height: 100vh;
            display: flex;
            background-color: #000000;
            flex-direction: column;
            z-index: 1; 
        }

        .main-content::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            
            background-image: url('back.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            opacity: 0.3; 
            
            z-index: -1;
            pointer-events: none;
        }


        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }
        }

        .btn-filled {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            padding: 10px 24px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s all ease;
        }

        .btn-filled:hover {
            background-color: var(--md-expressive-coral);
            transform: scale(1.02);
        }

        #game-container {
            width: 100%;
            max-width: 720px;
            background: var(--paper);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 16px 48px -8px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            margin: 40px 0;
        }

        #title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-bottom: 1.5px solid var(--border);
            background: var(--muted);
            gap: 0.75rem;
        }
        
        #title-bar-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        
        #title-bar .moon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            opacity: 0.85;
            color: var(--dark);
        }
        
        #game-title {
            font-family: var(--md-font-display);
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            color: var(--dark);
            white-space: nowrap;
        }
        
        #game-title span {
            font-weight: 400;
            opacity: 0.5;
            font-size: 0.8rem;
            margin-left: 0.15rem;
        }

        .window-dots {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        
        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            opacity: 0.5;
        }
        .dot.red    { background: #ff5f57; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green  { background: #28c840; }

        #status-bar {
            padding: 0.5rem 1.25rem;
            border-bottom: 1px dashed var(--border);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-faint);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-height: 2rem;
        }
        
        #status-bar::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--coral);
            flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #text-box {
            padding: 1.5rem 1.5rem 1rem;
            min-height: 260px;
            line-height: 1.75;
            font-size: 0.95rem;
            white-space: pre-wrap;
            overflow-y: auto;
            flex: 1;
            scroll-behavior: smooth;
            color: var(--dark);
        }
        
        #text-box::-webkit-scrollbar { width: 4px; }
        #text-box::-webkit-scrollbar-track { background: transparent; }
        #text-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .ascii-art  { color: #8ab4c9; font-family: 'Courier New', monospace; font-size: 0.78rem; line-height: 1.3; }
        .red-text   { color: #c0392b; }
        .green-text { color: #27ae60; }
        .cyan-text  { color: #2980b9; }
        .yellow-text{ color: var(--coral); }
        .center-text{ text-align: center; display: block; }

        #divider {
            height: 1px;
            background: var(--border);
            margin: 0 1.25rem;
        }

        #choice-box {
            padding: 0.875rem 1.25rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        #choice-box:empty {
            padding: 0;
        }

        #choice-box button {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--muted);
            color: var(--dark);
            border: 1.5px solid var(--border);
            border-radius: 0.6rem;
            text-align: left;
            font-family: var(--md-font-body);
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            line-height: 1.4;
        }

        #choice-box button::before {
            content: '›';
            color: var(--coral);
            font-size: 1.1rem;
            flex-shrink: 0;
            line-height: 1;
            margin-top: -1px;
        }

        #choice-box button:hover {
            background: var(--subtle);
            border-color: var(--coral);
            transform: translateX(2px);
        }

        #choice-box button:active {
            transform: translateX(1px) scale(0.99);
        }

        #footer-bar {
            padding: 0.6rem 1.25rem;
            border-top: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--muted);
        }
        
        #footer-bar .footer-brand {
            font-family: var(--md-font-display);
            font-size: 0.72rem;
            font-style: italic;
            color: var(--ink-faint);
            letter-spacing: 0.02em;
        }
        
        #footer-bar .footer-badge {
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--coral);
            border: 1px solid var(--coral);
            border-radius: 3rem;
            padding: 0.15rem 0.55rem;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            #game-container {
                border-radius: var(--md-shape-large);
                margin: 20px 0;
            }
            #text-box {
                min-height: 200px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 520px) {
            #game-container {
                border-radius: 16px;
            }
        }

        html, body {
    cursor: url('/Public/CUR/cursor.svg') 0 0, auto;
}

a, 
button, 
label, 
summary, 
select,
option,
input[type="submit"], 
input[type="button"], 
input[type="reset"], 
input[type="checkbox"], 
input[type="radio"], 
input[type="file"],
input[type="range"],
[role="button"], 
[role="link"], 
[role="menuitem"],
[onclick],          
.pointer,         
svg:has(path):hover  
{
    cursor: url('/Public/CUR/pointer.svg') 12 0, pointer !important;
}
input[type="text"], 
input[type="email"], 
input[type="password"], 
input[type="number"], 
input[type="search"], 
textarea, .about-material p,
[contenteditable="true"] {
    cursor: text;
}
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="m3-sidebar" id="m3Sidebar">
        <div class="sidebar-nav">
            <div class="nav-section">
                <a href="/www/" class="nav-item">
                    <span class="material-symbols-rounded">home</span>
                    <span>Home</span>
                </a>
                <a href="/www/#about" class="nav-item">
                    <span class="material-symbols-rounded">info</span>
                    <span>About</span>
                </a>
                <a href="/www/#download" class="nav-item">
                    <span class="material-symbols-rounded">download</span>
                    <span>Download</span>
                </a>
                <a href="/www/demo/" class="nav-item active">
                    <span class="material-symbols-rounded">stadia_controller</span>
                    <span>Demo</span>
                </a>
                <a href="/www/music/" class="nav-item">
                    <span class="material-symbols-rounded">audiotrack</span>
                    <span>Music</span>
                </a>
                <a href="/www/devlogs/" class="nav-item">
                    <span class="material-symbols-rounded">developer_mode</span>
                    <span>DevLogs</span>
                </a>

                <a href="/www/faq/" class="nav-item">
                    <span class="material-symbols-rounded">help</span>
                    <span>FAQ</span>
                </a>

                <a href="/www/docs/" class="nav-item">
                    <span class="material-symbols-rounded">menu_book</span>
                    <span>Docs</span>
                </a>

            </div>
        </div>
        <div class="sidebar-footer">
            <div class="social-row">
                <a href="https://github.com/LukzST" class="social-icon-md"><i class="fab fa-github"></i></a>
                <a href="https://www.instagram.com/UndPixelGames" class="social-icon-md"><i class="fab fa-instagram"></i></a>
                <a href="https://UndPixelGames.itch.io" class="social-icon-md"><i class="fab fa-itch-io"></i></a>
                <a href="https://www.youtube.com/@UndPixelGames" class="social-icon-md"><i class="fab fa-youtube"></i></a>
            </div>
             <p style="text-align:center; font-size:0.75rem; opacity:0.6;">© 2026  Undead Pixel Games</p>
        </div>
    </aside>

    <div class="main-content">
        <nav class="top-bar">
            <button class="menu-button-md" id="menuButtonSide">
                <span class="material-symbols-rounded" style="font-size: 28px;">menu</span>
            </button>
            <a href="https://UndPixelGames.itch.io/" target="_blank" class="btn-filled">Store <i class="fa-solid fa-chevron-right"></i></a>
        </nav>

        <div class="container">
            <div id="game-container">
                <div id="title-bar">
                    <div id="title-bar-left">
                        <span id="game-title">Pale Luna: Web Edition</span>
                    </div>
                    <div class="window-dots">
                        <div class="dot red"></div>
                        <div class="dot yellow"></div>
                        <div class="dot green"></div>
                    </div>
                </div>

                <div id="status-bar">Ready</div>
                <div id="text-box"></div>
                <div id="divider"></div>
                <div id="choice-box"></div>
            </div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('m3Sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const menuBtn = document.getElementById('menuButtonSide');
        
        function openSidebar() { 
            if (window.innerWidth <= 768) {
                sidebar.classList.add('open'); 
                overlay.classList.add('active'); 
                document.body.style.overflow = 'hidden';
            }
        }
        
        function closeSidebar() { 
            sidebar.classList.remove('open'); 
            overlay.classList.remove('active'); 
            document.body.style.overflow = ''; 
        }
        
        if (menuBtn) menuBtn.addEventListener('click', openSidebar);
        if (overlay) overlay.addEventListener('click', closeSidebar);
        
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) closeSidebar();
        });
    </script>
    <script src="main-web.js"></script>
</body>
</html>
